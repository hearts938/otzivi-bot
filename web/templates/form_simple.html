{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block body %}
<h1>{{ title }}</h1>
{% if msg %}<p style="color:green">{{ msg }}</p>{% endif %}
{% if err %}<p style="color:red">{{ err }}</p>{% endif %}
<form method="post" action="{{ action }}">
  {% for field in fields %}
  <div><label>{{ field.label }}<br/><input name="{{ field.name }}" type="{{ field.type or 'text' }}" value="{{ field.value or '' }}"/></label></div>
  {% endfor %}
  <button type="submit">{{ submit }}</button>
</form>
{% endblock %}
