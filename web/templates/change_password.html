{% extends "base.html" %}
{% block title %}Сменить пароль{% endblock %}
{% block body %}
<h1>Сменить пароль</h1>

{% if msg %}<p class="alert alert-ok">{{ msg }}</p>{% endif %}
{% if err %}<p class="alert alert-warn">{{ err }}</p>{% endif %}

<h2>1. Запросить код</h2>
<form method="post" action="/admin/password/send-code">
  <button type="submit">Отправить код на почту</button>
</form>

<h2>2. Ввести код и новый пароль</h2>
<form method="post" action="/admin/password/change">
  <div><label>Код из письма <input name="code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required/></label></div>
  <div><label>Новый пароль <input type="password" name="password" minlength="8" required/></label></div>
  <div><label>Повтор пароля <input type="password" name="password2" minlength="8" required/></label></div>
  <button type="submit">Сменить пароль</button>
</form>

<p><a href="/">На главную</a></p>
{% endblock %}
