{% extends "base.html" %}
{% block title %}Рассылка{% endblock %}
{% block body %}
<h1>Рассылка</h1>
{% if msg %}<p style="color:green">{{ msg }}</p>{% endif %}
{% if err %}<p style="color:red">{{ err }}</p>{% endif %}
<form method="post" action="/broadcast" enctype="multipart/form-data">
  <div><label>Текст<br/><textarea name="text" rows="6" cols="60" required></textarea></label></div>
  <div><label>Текст кнопки (start)<br/><input name="btn" type="text" value="Старт" required/></label></div>
  <div><label>Фото (необязательно)<br/><input name="photo" type="file" accept="image/*"/></label></div>
  <button type="submit">Отправить всем</button>
</form>
{% endblock %}
